{% extends "base.html" %}
{% block content %}
<main class="config-layout config-domain-layout config-domain-surface-layout config-language-layout">
  {% include "_config_nav.html" %}
  {% include "_config_page_header.html" %}
  <section class="floating-card config-domain-section">
    <form method="post" action="/config/language/save" class="editor-form">
      <input type="hidden" name="return_to" value="{{ return_to or '' }}">
      <label>
        {{ tr(request, 'config_language.default_language', 'Standardsprache') }}
        <select name="default_language">
          {% for row in language_rows %}
          <option value="{{ row.code }}" {% if default_language == row.code %}selected{% endif %}>{{ row.flag }} {{ row.label }}</option>
          {% endfor %}
        </select>
      </label>
      <button type="submit">{{ tr(request, 'config_language.save_default', 'Standardsprache speichern') }}</button>
    </form>
  </section>

  {% if request.state.can_access_advanced_config %}
  <section class="floating-card config-domain-section">
    <details class="skill-details">
      <summary>{{ tr(request, 'config_language.advanced_summary', 'Erweitert: Sprachdatei editieren') }}</summary>
      <div class="skill-details-content">
        <form method="get" action="/config/language" class="editor-form">
          <input type="hidden" name="return_to" value="{{ return_to or '' }}">
          <label>
            {{ tr(request, 'config_language.select_file', 'Datei auswählen') }}
            <select name="file" onchange="this.form.submit()">
              {% for row in language_rows %}
              {% set file_name = row.code + '.json' %}
              <option value="{{ file_name }}" {% if selected_file == file_name %}selected{% endif %}>{{ row.flag }} {{ row.label }} ({{ file_name }})</option>
              {% endfor %}
            </select>
          </label>
        </form>
        <form method="post" action="/config/language/file/save" class="editor-form">
          <input type="hidden" name="file_name" value="{{ selected_file }}">
          <input type="hidden" name="return_to" value="{{ return_to or '' }}">
          <label>
            {{ tr(request, 'config_language.content', 'Inhalt (JSON)') }}
            <textarea name="content" rows="16" spellcheck="false">{{ editor_content }}</textarea>
          </label>
          <button type="submit">{{ tr(request, 'config_language.save_file', 'Sprachdatei speichern') }}</button>
        </form>
      </div>
    </details>
  </section>
  {% endif %}
</main>
{% endblock %}
