{% from "_icons.html" import icon %}
<aside class="context-help-card">
  <div class="context-help-head">
    <strong>{{ heading }}</strong>
    {% if help_doc %}
    <a href="/help?doc={{ help_doc }}" class="context-help-link ui-action-link">{{ icon('help', 'ui-action-icon') }}{{ tr(request, 'context_help.open', 'Mehr dazu') }}</a>
    {% endif %}
  </div>
  <p>{{ body }}</p>
</aside>
