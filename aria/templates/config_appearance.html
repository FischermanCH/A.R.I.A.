{% extends "base.html" %}
{% block content %}
<main class="config-layout config-domain-layout config-domain-surface-layout config-appearance-layout">
  {% include "_config_nav.html" %}
  {% include "_config_page_header.html" %}
  <section class="floating-card config-domain-section">
    <form method="post" action="/config/appearance/save" class="editor-form">
      <input type="hidden" name="return_to" value="{{ return_to or '' }}">
      <label>
        {{ tr(request, 'config_appearance.theme_label', 'Theme palette') }}
        <select name="theme">
          {% for row in theme_rows %}
          <option value="{{ row.value }}" {% if current_theme == row.value %}selected{% endif %}>{{ tr(request, row.label_key, row.fallback) }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        {{ tr(request, 'config_appearance.background_label', 'Background style') }}
        <select name="background">
          {% for row in background_rows %}
          <option value="{{ row.value }}" {% if current_background == row.value %}selected{% endif %}>{{ tr(request, row.label_key, row.fallback) }}</option>
          {% endfor %}
        </select>
      </label>
      <p class="hint-text">{{ tr(request, 'config_appearance.hint', 'The selection updates the whole interface and is stored centrally in the UI config.') }}</p>
      <button type="submit">{{ tr(request, 'config_appearance.save', 'Save appearance') }}</button>
    </form>
  </section>
</main>
{% endblock %}
